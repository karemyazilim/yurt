<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Subtle radial glow behind title -->
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#E53935" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E53935" stop-opacity="0"/>
    </radialGradient>

    <!-- Red accent gradient for the line -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E53935" stop-opacity="0"/>
      <stop offset="20%" stop-color="#E53935" stop-opacity="1"/>
      <stop offset="80%" stop-color="#E53935" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E53935" stop-opacity="0"/>
    </linearGradient>

    <!-- Feature pill background -->
    <linearGradient id="pill-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Decorative grid dots (subtle) -->
  <g opacity="0.04" fill="#ffffff">
    <circle cx="80" cy="80" r="1.5"/>
    <circle cx="160" cy="80" r="1.5"/>
    <circle cx="240" cy="80" r="1.5"/>
    <circle cx="320" cy="80" r="1.5"/>
    <circle cx="400" cy="80" r="1.5"/>
    <circle cx="480" cy="80" r="1.5"/>
    <circle cx="560" cy="80" r="1.5"/>
    <circle cx="640" cy="80" r="1.5"/>
    <circle cx="720" cy="80" r="1.5"/>
    <circle cx="800" cy="80" r="1.5"/>
    <circle cx="880" cy="80" r="1.5"/>
    <circle cx="960" cy="80" r="1.5"/>
    <circle cx="1040" cy="80" r="1.5"/>
    <circle cx="1120" cy="80" r="1.5"/>
    <circle cx="1200" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/>
    <circle cx="160" cy="160" r="1.5"/>
    <circle cx="240" cy="160" r="1.5"/>
    <circle cx="320" cy="160" r="1.5"/>
    <circle cx="400" cy="160" r="1.5"/>
    <circle cx="480" cy="160" r="1.5"/>
    <circle cx="560" cy="160" r="1.5"/>
    <circle cx="640" cy="160" r="1.5"/>
    <circle cx="720" cy="160" r="1.5"/>
    <circle cx="800" cy="160" r="1.5"/>
    <circle cx="880" cy="160" r="1.5"/>
    <circle cx="960" cy="160" r="1.5"/>
    <circle cx="1040" cy="160" r="1.5"/>
    <circle cx="1120" cy="160" r="1.5"/>
    <circle cx="1200" cy="160" r="1.5"/>
    <circle cx="80" cy="480" r="1.5"/>
    <circle cx="160" cy="480" r="1.5"/>
    <circle cx="240" cy="480" r="1.5"/>
    <circle cx="320" cy="480" r="1.5"/>
    <circle cx="400" cy="480" r="1.5"/>
    <circle cx="480" cy="480" r="1.5"/>
    <circle cx="560" cy="480" r="1.5"/>
    <circle cx="640" cy="480" r="1.5"/>
    <circle cx="720" cy="480" r="1.5"/>
    <circle cx="800" cy="480" r="1.5"/>
    <circle cx="880" cy="480" r="1.5"/>
    <circle cx="960" cy="480" r="1.5"/>
    <circle cx="1040" cy="480" r="1.5"/>
    <circle cx="1120" cy="480" r="1.5"/>
    <circle cx="1200" cy="480" r="1.5"/>
    <circle cx="80" cy="560" r="1.5"/>
    <circle cx="160" cy="560" r="1.5"/>
    <circle cx="240" cy="560" r="1.5"/>
    <circle cx="320" cy="560" r="1.5"/>
    <circle cx="400" cy="560" r="1.5"/>
    <circle cx="480" cy="560" r="1.5"/>
    <circle cx="560" cy="560" r="1.5"/>
    <circle cx="640" cy="560" r="1.5"/>
    <circle cx="720" cy="560" r="1.5"/>
    <circle cx="800" cy="560" r="1.5"/>
    <circle cx="880" cy="560" r="1.5"/>
    <circle cx="960" cy="560" r="1.5"/>
    <circle cx="1040" cy="560" r="1.5"/>
    <circle cx="1120" cy="560" r="1.5"/>
    <circle cx="1200" cy="560" r="1.5"/>
  </g>

  <!-- Decorative corner accents -->
  <path d="M0,0 L80,0 L80,3 L3,3 L3,80 L0,80 Z" fill="#E53935" opacity="0.3"/>
  <path d="M1280,640 L1200,640 L1200,637 L1277,637 L1277,560 L1280,560 Z" fill="#E53935" opacity="0.3"/>

  <!-- Main title: Yurt -->
  <text x="640" y="240" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" letter-spacing="6">Yurt</text>

  <!-- Red accent line below title -->
  <rect x="520" y="268" width="240" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="640" y="330" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" fill="#a0aec0" letter-spacing="2">Açık Kaynak PaaS Platformu</text>

  <!-- Tagline -->
  <text x="640" y="380" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#718096" letter-spacing="1">Vercel, Heroku ve Netlify'a Türkçe alternatif</text>

  <!-- Feature pills row -->
  <g transform="translate(640, 470)">
    <!-- Docker pill -->
    <g transform="translate(-340, 0)">
      <rect x="-70" y="-22" width="140" height="44" rx="22" fill="url(#pill-bg)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <!-- Docker whale icon (simplified) -->
      <g transform="translate(-40, -8)" fill="#2496ED">
        <rect x="0" y="0" width="4" height="4" rx="0.5"/>
        <rect x="5" y="0" width="4" height="4" rx="0.5"/>
        <rect x="10" y="0" width="4" height="4" rx="0.5"/>
        <rect x="0" y="5" width="4" height="4" rx="0.5"/>
        <rect x="5" y="5" width="4" height="4" rx="0.5"/>
        <rect x="10" y="5" width="4" height="4" rx="0.5"/>
        <rect x="15" y="5" width="4" height="4" rx="0.5"/>
        <rect x="5" y="10" width="4" height="4" rx="0.5"/>
        <rect x="10" y="10" width="4" height="4" rx="0.5"/>
        <rect x="15" y="10" width="4" height="4" rx="0.5"/>
      </g>
      <text x="10" y="6" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#e2e8f0">Docker</text>
    </g>

    <!-- Turkce pill -->
    <g transform="translate(-113, 0)">
      <rect x="-70" y="-22" width="140" height="44" rx="22" fill="url(#pill-bg)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <!-- TR flag simplified -->
      <g transform="translate(-44, -8)">
        <rect width="20" height="14" rx="2" fill="#E53935"/>
        <circle cx="9" cy="7" r="4" fill="#ffffff"/>
        <circle cx="10.5" cy="7" r="3.2" fill="#E53935"/>
        <polygon points="13,4.5 13.8,7 11.5,5.3 14.5,5.3 12.2,7" fill="#ffffff" transform="scale(0.6) translate(11,3)"/>
      </g>
      <text x="10" y="6" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#e2e8f0">Türkçe</text>
    </g>

    <!-- SMS pill -->
    <g transform="translate(113, 0)">
      <rect x="-70" y="-22" width="140" height="44" rx="22" fill="url(#pill-bg)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <!-- Message/SMS icon -->
      <g transform="translate(-44, -9)" fill="none" stroke="#48BB78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2,2 L18,2 C19,2 20,3 20,4 L20,13 C20,14 19,15 18,15 L6,15 L2,19 L2,4 C2,3 3,2 4,2 Z"/>
        <line x1="7" y1="7" x2="15" y2="7"/>
        <line x1="7" y1="11" x2="12" y2="11"/>
      </g>
      <text x="10" y="6" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#e2e8f0">SMS</text>
    </g>

    <!-- Guvenlik pill -->
    <g transform="translate(340, 0)">
      <rect x="-76" y="-22" width="152" height="44" rx="22" fill="url(#pill-bg)" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
      <!-- Shield icon -->
      <g transform="translate(-50, -10)" fill="none" stroke="#F6AD55" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10,2 L18,6 L18,12 C18,16 14,19 10,20 C6,19 2,16 2,12 L2,6 Z"/>
        <polyline points="7,11 9,13 13,9"/>
      </g>
      <text x="12" y="6" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" fill="#e2e8f0">Güvenlik</text>
    </g>
  </g>

  <!-- Bottom thin red accent bar -->
  <rect x="0" y="634" width="1280" height="6" fill="#E53935" opacity="0.6"/>
</svg>
